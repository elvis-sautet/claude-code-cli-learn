<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>
  <body>
    <!-- ============ PRE-JOIN ============ -->
    <section id="prejoin" class="prejoin">
      <div class="prejoin-card">
        <div class="preview-side">
          <div class="preview-wrap">
            <video id="preview-video" autoplay playsinline muted></video>
            <p id="preview-off" class="preview-off" hidden>
              <iconify-icon icon="mdi:camera-off"></iconify-icon> Camera is off
            </p>
            <div class="preview-controls">
              <button id="pj-mic" class="round" aria-pressed="true" aria-label="Turn off microphone" title="Microphone">
                <iconify-icon icon="mdi:microphone"></iconify-icon>
              </button>
              <button id="pj-cam" class="round" aria-pressed="true" aria-label="Turn off camera" title="Camera">
                <iconify-icon icon="mdi:video"></iconify-icon>
              </button>
            </div>
          </div>
          <div class="device-row">
            <label class="device">
              <iconify-icon icon="mdi:microphone"></iconify-icon>
              <select id="mic-select"><option value="">Default microphone</option></select>
            </label>
            <label class="device">
              <iconify-icon icon="mdi:camera"></iconify-icon>
              <select id="cam-select"><option value="">Default camera</option></select>
            </label>
          </div>
        </div>

        <div class="join-side">
          <h1>Ready to join?</h1>
          <p class="muted">Set your name and check your camera, then join the meeting.</p>
          <label class="field">
            <span>Your name</span>
            <input id="name-input" type="text" placeholder="e.g. Elvis" autocomplete="name" />
          </label>
          <label class="field">
            <span>Room</span>
            <div class="input-group">
              <input id="room-input" type="text" placeholder="room name" />
              <button id="copy-link" class="round ghost" aria-label="Copy meeting link" title="Copy meeting link">
                <iconify-icon icon="mdi:link-variant"></iconify-icon>
              </button>
            </div>
          </label>
          <button id="join-btn" class="btn-primary">
            <iconify-icon icon="mdi:video"></iconify-icon> Join now
          </button>
          <p id="prejoin-status" class="status" role="status" aria-live="polite"></p>
        </div>
      </div>
    </section>

    <!-- ============ MEETING ============ -->
    <section id="meeting" class="meeting" hidden>
      <div class="stage">
        <div id="grid" class="grid" aria-label="Participants"></div>

        <!-- Chat panel -->
        <aside id="chat" class="chat" hidden aria-label="In-call messages">
          <header class="chat-head">
            <span>In-call messages</span>
            <button id="chat-close" class="round ghost" aria-label="Close chat" title="Close chat">
              <iconify-icon icon="mdi:close"></iconify-icon>
            </button>
          </header>
          <div id="chat-log" class="chat-log"></div>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" placeholder="Send a message to everyone" autocomplete="off" />
            <button type="submit" class="round ghost" aria-label="Send message" title="Send">
              <iconify-icon icon="mdi:send"></iconify-icon>
            </button>
          </form>
        </aside>
      </div>

      <!-- Bottom control bar -->
      <footer class="bar">
        <div class="bar-left">
          <span id="room-label" class="room-label"></span>
          <span id="participant-count" class="participant-count" aria-live="polite">
            <iconify-icon icon="mdi:account-group"></iconify-icon> <span id="participant-num">1</span>
          </span>
        </div>
        <div class="bar-center">
          <button id="m-mic" class="round" aria-pressed="true" aria-label="Mute" title="Mute">
            <iconify-icon icon="mdi:microphone"></iconify-icon>
          </button>
          <button id="m-cam" class="round" aria-pressed="true" aria-label="Turn off camera" title="Camera">
            <iconify-icon icon="mdi:video"></iconify-icon>
          </button>
          <button id="m-share" class="round" aria-pressed="false" aria-label="Present screen" title="Present now">
            <iconify-icon icon="mdi:monitor-share"></iconify-icon>
          </button>
          <button id="m-chat" class="round" aria-pressed="false" aria-label="Toggle chat" title="Chat">
            <iconify-icon icon="mdi:message-text"></iconify-icon>
          </button>
          <button id="m-leave" class="round leave" aria-label="Leave call" title="Leave call">
            <iconify-icon icon="mdi:phone-hangup"></iconify-icon>
          </button>
        </div>
        <div class="bar-right">
          <button id="m-copy" class="round ghost" aria-label="Copy meeting link" title="Copy link">
            <iconify-icon icon="mdi:link-variant"></iconify-icon>
          </button>
        </div>
      </footer>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
